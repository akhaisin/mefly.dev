title: "mefly.dev"
description: ""
baseurl: ""
url: "https://mefly.dev"
theme: minima

# Collections
collections:
  articles:
    output: true
    permalink: /articles/:slug/
  apps:
    output: true
    permalink: /apps/:slug/

tabs:
  left_group:
    - id: articles
      label: "Articles"
      url: "/"
      icon: "/assets/img/article.svg"
      css_class: "left"
    - id: about
      label: "About"
      url: "/about/"
      css_class: "left"
  right_group:
    - id: track-builder
      label: "Track Builder"
      group: apps
      url: "/apps/track-builder/"
      css_class: "right"
    - id: csrf-tester
      label: "CSRF Tester"
      group: apps
      url: "/apps/csrf-tester/"
      css_class: "right"

# Build settings
plugins:
  - jekyll-feed
